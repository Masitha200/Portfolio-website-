<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e152a" />
      <stop offset="100%" stop-color="#0c0a09" />
    </radialGradient>
    
    <!-- Neon Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <linearGradient id="secondaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#d946ef" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.8" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Glow for Background -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="48" fill="url(#bgGrad)" />
  <rect width="506" height="506" x="3" y="3" rx="45" fill="none" stroke="#292524" stroke-width="6" />

  <!-- Background Ambient Glow -->
  <circle cx="256" cy="256" r="120" fill="url(#glowGrad)" opacity="0.15" filter="url(#softGlow)" />

  <!-- Group containing Logo Icon -->
  <g transform="translate(10, 10)">
    <!-- Document Silhouette Shadow/Glow -->
    <path d="M 166 110 L 296 110 L 346 160 L 346 380 Q 346 390 336 390 L 166 390 Q 156 390 156 380 L 156 120 Q 156 110 166 110 Z" 
          fill="url(#secondaryGrad)" opacity="0.3" filter="url(#neonGlow)" />

    <!-- Main Document Shape -->
    <path d="M 160 100 L 290 100 L 340 150 L 340 370 Q 340 380 330 380 L 160 380 Q 150 380 150 370 L 150 110 Q 150 100 160 100 Z" 
          fill="#1c1917" stroke="url(#primaryGrad)" stroke-width="4" />

    <!-- Folded Corner -->
    <path d="M 290 100 L 290 140 Q 290 150 300 150 L 340 150 Z" 
          fill="url(#primaryGrad)" />
    
    <!-- Stylized Modern 'A' Inside Document -->
    <!-- Left leg of A -->
    <path d="M 210 320 L 235 210 L 255 210 L 230 320 Z" fill="url(#secondaryGrad)" />
    
    <!-- Right leg of A -->
    <path d="M 240 320 L 255 210 L 275 210 L 290 320 Z" fill="url(#primaryGrad)" />
    
    <!-- Crossbar of A -->
    <path d="M 225 300 L 285 300 L 282 312 L 222 312 Z" fill="url(#glowGrad)" />

    <!-- Aether Ring overlaying -->
    <circle cx="245" cy="245" r="45" fill="none" stroke="url(#primaryGrad)" stroke-width="6" stroke-dasharray="180 90" filter="url(#neonGlow)" transform="rotate(-40 245 245)" />
    <circle cx="245" cy="245" r="30" fill="none" stroke="url(#secondaryGrad)" stroke-width="4" stroke-dasharray="100 60" transform="rotate(70 245 245)" />

    <!-- Modern tech lines -->
    <line x1="180" y1="140" x2="260" y2="140" stroke="#a8a29e" stroke-width="3" stroke-linecap="round" opacity="0.4" />
    <line x1="180" y1="170" x2="240" y2="170" stroke="#a8a29e" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  </g>
</svg>
