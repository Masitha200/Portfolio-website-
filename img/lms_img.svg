<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#24120a" />
      <stop offset="100%" stop-color="#0c0a09" />
    </radialGradient>
    
    <!-- Neon Accent Gradients (Orange to Yellow) -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>
    
    <!-- Secondary Glow (Rust Orange to Pink/Purple) -->
    <linearGradient id="secondaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- General glow gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#facc15" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0.8" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft Ambient Glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="48" fill="url(#bgGrad)" />
  <rect width="506" height="506" x="3" y="3" rx="45" fill="none" stroke="#292524" stroke-width="6" />

  <!-- Background Ambient Glow -->
  <circle cx="256" cy="256" r="130" fill="url(#glowGrad)" opacity="0.12" filter="url(#softGlow)" />

  <!-- Center Group containing Book & Database Tech Icon -->
  <g transform="translate(10, 10)">
    <!-- Tech Rings (Athena Orbit) -->
    <circle cx="246" cy="246" r="140" fill="none" stroke="url(#primaryGrad)" stroke-width="1.5" stroke-dasharray="10 15 150 10 30" opacity="0.4" />
    <circle cx="246" cy="246" r="115" fill="none" stroke="url(#secondaryGrad)" stroke-width="2" stroke-dasharray="50 150" filter="url(#neonGlow)" transform="rotate(-60 246 246)" />
    
    <!-- Database Stacks / Grid Columns behind Book -->
    <!-- Center Left DB Stack -->
    <rect x="216" y="110" width="60" height="20" rx="3" fill="#1c1917" stroke="url(#primaryGrad)" stroke-width="2" opacity="0.75" />
    <rect x="221" y="114" width="50" height="4" rx="2" fill="url(#primaryGrad)" />
    
    <rect x="216" y="136" width="60" height="20" rx="3" fill="#1c1917" stroke="url(#primaryGrad)" stroke-width="2" opacity="0.75" />
    <rect x="221" y="140" width="50" height="4" rx="2" fill="url(#primaryGrad)" />
    
    <!-- Open Book Silhouette Glow -->
    <path d="M 246 360 C 210 320, 140 320, 110 330 L 110 190 C 140 180, 210 180, 246 220 C 282 180, 352 180, 382 190 L 382 330 C 352 320, 282 320, 246 360 Z" 
          fill="url(#secondaryGrad)" opacity="0.25" filter="url(#neonGlow)" />

    <!-- Open Book Main Outline -->
    <path d="M 246 350 C 210 310, 140 310, 110 320 L 110 180 C 140 170, 210 170, 246 210 C 282 170, 352 170, 382 180 L 382 320 C 352 310, 282 310, 246 350 Z" 
          fill="#1c1917" stroke="url(#primaryGrad)" stroke-width="4" />
          
    <path d="M 246 210 L 246 350" stroke="url(#primaryGrad)" stroke-width="3" />

    <!-- Book Pages Details (Faux Text Lines / Digital Binary Elements) -->
    <!-- Left page text lines -->
    <line x1="140" y1="215" x2="210" y2="210" stroke="url(#secondaryGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.9" />
    <line x1="140" y1="245" x2="200" y2="240" stroke="#fafaf9" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="140" y1="275" x2="215" y2="265" stroke="url(#primaryGrad)" stroke-width="3" stroke-linecap="round" />
    <line x1="155" y1="300" x2="190" y2="295" stroke="#fafaf9" stroke-width="3" stroke-linecap="round" opacity="0.5" />

    <!-- Right page text lines -->
    <line x1="282" y1="210" x2="352" y2="215" stroke="url(#secondaryGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.9" />
    <line x1="292" y1="240" x2="352" y2="245" stroke="#fafaf9" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="277" y1="265" x2="352" y2="275" stroke="url(#primaryGrad)" stroke-width="3" stroke-linecap="round" />
    <line x1="302" y1="295" x2="337" y2="300" stroke="#fafaf9" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    
    <!-- Digital Data Nodes floating over the book -->
    <circle cx="150" cy="140" r="5" fill="#f97316" filter="url(#neonGlow)" />
    <line x1="150" y1="140" x2="185" y2="185" stroke="#f97316" stroke-width="1.5" opacity="0.5" />

    <circle cx="340" cy="130" r="6" fill="#facc15" filter="url(#neonGlow)" />
    <line x1="340" y1="130" x2="310" y2="175" stroke="#facc15" stroke-width="1.5" opacity="0.5" />
  </g>
</svg>
